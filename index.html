<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    body { font-family: Century Gothic, sans-serif; margin: 10px; }
    #calendar { max-width: 1000px; margin: auto; }
	
	/* Event colors */
    .event-hotel 
	{
      background-color: #d9b938 !important;   /* Yellow */
      border-color: #bfa12f !important;
      color: #000 !important;
    }

    .event-flight 
	{
      background-color: #66aefc !important;   /* Blue */
      border-color: #3d8edc  !important;
      color: #000 !important;
    }

    .event-tour 
	{
      background-color: #6bd36b !important;   /* Green */
      border-color: #4caf50 !important;
      color: #000 !important;
    }
	
    .event-meal 
	{
      background-color: #ffb3d1 !important;   /* Pink */
      border-color: #e68bb3 !important;
      color: #000 !important;
    }

    .event-misc 
	{
      background-color: #d3d3d3 !important;   /* Gray */
      border-color: #a9a9a9 !important;
      color: #000 !important;
    }
	  
	.fc-event-title 
	{
		font-size: 11px !important;
		font-weight: 350 !important;
	}
	.fc-event 
	{
		padding: 2px 4px !important;
		border-radius: 4px !important;
  	    box-shadow: inset 0 0 0 1px #a68f28;
	}
	  
	.fc-daygrid-event-dot 
	{
  		display: none !important;
    }
	  
	.fc-daygrid-event
	{
  		padding-left: 2px !important;
	}



	#legend 
	{
	  max-width: 900px;
	  margin: 0 auto 20px auto;
	  display: flex;
	  gap: 12px;
	  flex-wrap: wrap;
	  font-size: 14px;
	}
	
	.legend-item 
	{
	  padding: 4px 10px;
	  border-radius: 4px;
	  font-weight: bold;
	}
	  
#event-form 
{
  width: 220px;
  float: left;
  margin-right: 20px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fafafa;
}

#event-form input,
#event-form select 
{
  width: 100%;
  margin-bottom: 10px;
}

#calendar 
{
  margin-left: 260px; 
}
  </style>
</head>


<body>

<div id="event-form">
  <h3>Add New Event</h3>

  	<label>Title:</label>
  	<input type="text" id="new-title">

  	<label>Date:</label>
  	<input type="date" id="new-date">
	<label>Start Time:</label>
	<input type="time" id="new-time">


  <label>Category:</label>
  <select id="new-category">
    <option value="event-hotel">Hotel</option>
    <option value="event-flight">Flight</option>
    <option value="event-tour">Tour</option>
    <option value="event-meal">Meal</option>
    <option value="event-misc">Misc</option>
  </select>

  <button id="add-event-btn">Add Event</button>
</div>
	
  <h1>London Trip Itinerary</h1>
    <div id="legend">
	  <span class="legend-item event-hotel">Hotel</span>
	  <span class="legend-item event-flight">Flight</span>
	  <span class="legend-item event-tour">Tour</span>
	  <span class="legend-item event-meal">Meal</span>
	  <span class="legend-item event-misc">Misc</span>
  </div>
<div id="calendar"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() 
	{
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), 
	  {
        initialView: 'dayGridMonth',
        events: 'events.json',
		eventClick: function(info) 
		{
          const start = info.event.start ? info.event.start.toLocaleString() : "";
          const end = info.event.end ? info.event.end.toLocaleString() : "";
          alert(info.event.title + "\\n" + start + (end ? " → " + end : ""));
		},
			
		eventDidMount: function(info) 
		{
		  if (info.event.url) 
		  {
			info.el.setAttribute("target", "_blank");
		  }
		}
		  
      });
		
		document.getElementById('add-event-btn').addEventListener('click', function() 
		{
		  const title = document.getElementById('new-title').value;
		  const date = document.getElementById('new-date').value;
		  const time = document.getElementById('new-time').value;
		  const category = document.getElementById('new-category').value;
		
		  if (!title || !date) 
		  {
		    alert("Please enter a title and date.");
		    return;
		  }
		  const startDateTime = time ? `${date}T${time}` : date;
		
		  calendar.addEvent(
		  {
		    title: title,
		    start: startDateTime,
		    className: category
		  });
		
		  document.getElementById('new-title').value = "";
		  document.getElementById('new-date').value = "";
		  document.getElementById('new-time').value = "";
		});

		
      calendar.render();
    });
  </script>
</body>
</html>
