<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    #calendar { max-width: 900px; margin: auto; }
	
	/* Event colors */
    .event-hotel {
      background-color: #f7e463 ;   /* Yellow */
      border-color: #e0c84d ;
      color: #000 ;
    }

    .event-flight {
      background-color: #4da3ff ;   /* Blue */
      border-color: #1c7ed6 ;
      color: #fff ;
    }

    .event-tour {
      background-color: #6bd36b ;   /* Green */
      border-color: #4caf50 ;
      color: #000 ;
    }
	
    .event-meal {
      background-color: #ffb3d1 ;   /* Pink */
      border-color: #e68bb3 ;
      color: #000 ;
    }

    .event-misc {
      background-color: #d3d3d3 ;   /* Gray */
      border-color: #a9a9a9 ;
      color: #000 ;
    }

  </style>
</head>


<body>
  <h1>London Trip Itinerary — September 2026</h1>
  <div id="calendar"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() 
	{
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), 
	  {
        initialView: 'dayGridMonth',
        events: 'events.json',
		eventClick: function(info) 
		{
          const start = info.event.start ? info.event.start.toLocaleString() : "";
          const end = info.event.end ? info.event.end.toLocaleString() : "";
          alert(info.event.title + "\\n" + start + (end ? " → " + end : ""));
		}
      });
      calendar.render();
    });
  </script>
</body>
</html>
