<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    body { font-family: Century Gothic, sans-serif; margin: 20px; }
    #calendar { max-width: 900px; margin: auto; }
	
	/* Event colors */
    .event-hotel {
      background-color: #f7e463 !important;   /* Yellow */
      border-color: #e0c84d !important;
      color: #000 !important;
    }

    .event-flight {
      background-color: #4da3ff !important;   /* Blue */
      border-color: #1c7ed6 !important;
      color: #fff !important;
    }

    .event-tour {
      background-color: #6bd36b !important;   /* Green */
      border-color: #4caf50 !important;
      color: #000 !important;
    }
	
    .event-meal {
      background-color: #ffb3d1 !important;   /* Pink */
      border-color: #e68bb3 !important;
      color: #000 !important;
    }

    .event-misc {
      background-color: #d3d3d3 !important;   /* Gray */
      border-color: #a9a9a9 !important;
      color: #000 !important;
    }
	  
	.fc-event-title 
	{
		font-size: 11px !important;
		font-weight: 300 !important;
	}
	.fc-event 
	{
		padding: 2px 4px !important;
		border-radius: 4px !important;
	}


	#legend 
	{
	  max-width: 900px;
	  margin: 0 auto 20px auto;
	  display: flex;
	  gap: 12px;
	  flex-wrap: wrap;
	  font-size: 14px;
	}
	
	.legend-item 
	{
	  padding: 4px 10px;
	  border-radius: 4px;
	  font-weight: bold;
	}

  </style>
</head>


<body>
  <h1>London Trip Itinerary</h1>
    <div id="legend">
	  <span class="legend-item event-hotel">Hotel</span>
	  <span class="legend-item event-flight">Flight</span>
	  <span class="legend-item event-tour">Tour</span>
	  <span class="legend-item event-meal">Meal</span>
	  <span class="legend-item event-misc">Misc</span>
  </div>
<div id="calendar"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() 
	{
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), 
	  {
        initialView: 'dayGridMonth',
        events: 'events.json',
		eventClick: function(info) 
		{
          const start = info.event.start ? info.event.start.toLocaleString() : "";
          const end = info.event.end ? info.event.end.toLocaleString() : "";
          alert(info.event.title + "\\n" + start + (end ? " → " + end : ""));
		},
			
		eventDidMount: function(info) 
		{
		  if (info.event.url) 
		  {
			info.el.setAttribute("target", "_blank");
		  }
		}
		  
      });
      calendar.render();
    });
  </script>
</body>
</html>
